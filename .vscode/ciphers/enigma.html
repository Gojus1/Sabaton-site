<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sabaton – Enigma</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header id="header">
<div class="logo" id="logo">WHATSECRET</div>
<nav class="top-nav">
<button>Info</button>
<button>Donate</button>
<button>Contact</button>
</nav>
</header>

<div id="layout">

<aside id="ciphers">
<h2>Ciphers</h2>
<ul>
<li><a href="enigma.html"><b>Enigma</b></a></li>
<li><a href="shamir.html">Shamir</a></li>
<li><a href="rsa.html">RSA</a></li>
<li><a href="rabin.html">Rabin</a></li>
<li><a href="stream.html">Stream</a></li>
</ul>
</aside>

<main id="main">

<h1>Enigma</h1>

<section class="panel">

<label>Alphabet</label>
<input id="alph" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ">

<label>Cipher</label>
<textarea id="cipher"></textarea>

<label>Rotor 1 (CSV)</label>
<input id="r1">

<label>Rotor 2 (CSV)</label>
<input id="r2">

<label>Reflector (Optional)</label>
<input id="ref">

<label>Key</label>
<input id="key">

<label>Plain hint (Optional)</label>
<input id="plain">

<button class="action" onclick="decode()">Decode</button>

<div id="result" class="output">(waiting)</div>

</section>

</main>
</div>

<script>

function decode(){

let alph = encodeURIComponent(document.getElementById("alph").value);
let cipher = encodeURIComponent(document.getElementById("cipher").value);

let r1 = document.getElementById("r1").value;
let r2 = document.getElementById("r2").value;
let ref = document.getElementById("ref").value;
let key = document.getElementById("key").value;
let plain = document.getElementById("plain").value;

let frag = "R1:"+r1+"|R2:"+r2;

if(ref.length>0) frag += "|REF:"+ref;
if(key.length>0) frag += "|KEY:"+key;
if(plain.length>0) frag += "|PLAIN:"+plain;

frag = encodeURIComponent(frag);

let url =
"https://whatsecret.org/enigma?alph="+alph+"&cipher="+cipher+"&frag="+frag;

let result = document.getElementById("result");
result.textContent = "Running...";

fetch(url)
.then(r=>r.text())
.then(t=>result.textContent=t)
.catch(e=>result.textContent=e);

}

  const logo = document.getElementById('logo');
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    window.location.href = '/.vscode/index.html';
  });

</script>

</body>
</html>
