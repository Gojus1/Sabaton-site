<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WHATSECRET – Stream Cipher</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../favicon.png" type="image/png">
</head>

<body>

<header id="header">
<div class="logo" id="logo">WHATSECRET</div>

<nav class="top-nav">
</nav>
</header>

<div id="layout">

<aside id="ciphers">

<h2>Ciphers</h2>

<ul>
<li><a href="enigma.html">Enigma</a></li>
<li><a href="shamir.html">Shamir</a></li>
<li><a href="rsa.html">RSA</a></li>
<li><a href="rabin.html">Rabin</a></li>
<li><a href="stream.html"><b>Stream</b></a></li>
</ul>

</aside>

<main id="main">

<h1>Stream Cipher</h1>

<section class="panel">

<label>Cipher</label>
<textarea id="cipher"></textarea>

<label>Fragment</label>
<input id="frag">

<label>Alphabet</label>
<input id="alph" placeholder="ABCDEFGHIJKLMNOPQRSTUVWXYZ ">

<button class="action" onclick="decodeStream()">Decode</button>

<div id="result" class="output">Waiting for input...</div>

</section>

</main>

</div>

<script>

async function decodeStream() {

const cipher = document.getElementById('cipher').value.trim();
const frag = document.getElementById('frag').value.trim();
const alph = document.getElementById('alph').value.trim();

const params = new URLSearchParams();
params.set('cipher', cipher);
params.set('frag', frag);
if (alph) params.set('alph', alph);

const url = `https://api.whatsecret.org/stream?${params.toString()}`;

const resultDiv = document.getElementById('result');
resultDiv.textContent = "Running...";

try {

const res = await fetch(url);
const text = await res.text();

resultDiv.textContent = text;

} catch (e) {

resultDiv.textContent = "Error: " + e;

}

}
  const logo = document.getElementById('logo');
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    window.location.href = '/';
  });
</script>

</body>
</html>
