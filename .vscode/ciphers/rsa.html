<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sabaton – RSA Cipher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
}

#header {
    grid-column: 1 / 3;
    background: #1c1c1c;
    display: flex;
    align-items: center;
    padding: 0 20px;
}
#header h1 {
    flex: 1;
    margin: 0;
}
#header button {
    margin-left: 10px;
    background: #333;
    color: #eee;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

#sidebar {
    background: #161616;
    padding: 15px;
}
#sidebar h2 {
    font-size: 18px;
}
#sidebar a {
    display: block;
    color: #bbb;
    text-decoration: none;
    margin: 6px 0;
}
#sidebar a:hover {
    color: #fff;
}

#main {
    padding: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input, textarea, select {
    width: 100%;
    background: #222;
    color: #eee;
    border: 1px solid #444;
    padding: 8px;
    margin-top: 4px;
}

textarea {
    min-height: 100px;
}

button.action {
    margin-top: 16px;
    padding: 10px 16px;
    background: #0066cc;
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    white-space: pre-wrap;
    background: #000;
    border: 1px solid #444;
    padding: 10px;
    margin-top: 16px;
}
</style>
</head>

<body>

<div id="header">
    <h1>Sabaton</h1>
    <button>Info</button>
    <button>Donate</button>
    <button>Contact</button>
</div>

<div id="sidebar">
    <h2>Ciphers</h2>
    <a href="rabin.html">Rabin</a>
    <a href="rsa.html"><b>RSA</b></a>
</div>

<div id="main">
    <h2>RSA Decryption</h2>

    <label>Alphabet</label>
    <input id="alph" value="aąbcčdeęėfghiįyjklmnoprsštuųūvzž ">

    <label>Mode</label>
    <select id="mode">
        <option value="normal">Normal</option>
        <option value="mod">Common Modulus</option>
        <option value="derive">Derive d</option>
    </select>

    <label>Ciphertext (decimal)</label>
    <textarea id="cipher"></textarea>

    <label>Fragment (frag)</label>
    <textarea id="frag"
placeholder="Normal: [n,e,d]:[n,e,d]
Mod: mod:[n,e,c]|[n,e,c]
Derive: derive:n:e1:d1:e2"></textarea>

    <button class="action" onclick="runRSA()">Run RSA</button>

    <label>Output</label>
    <div id="output">(waiting)</div>
</div>

<script>
function runRSA() {
    const alph   = document.getElementById("alph").value;
    const cipher = document.getElementById("cipher").value.trim();
    const frag   = document.getElementById("frag").value.trim();
    const output = document.getElementById("output");

    if (!frag) {
        output.textContent = "ERROR: frag is required";
        return;
    }

    const url =
        "http://localhost:8080/rsa" +
        "?alph="   + encodeURIComponent(alph) +
        "&cipher=" + encodeURIComponent(cipher) +
        "&frag="   + encodeURIComponent(frag);

    output.textContent = "Running...";

    fetch(url)
        .then(r => r.text())
        .then(t => output.textContent = t)
        .catch(e => output.textContent = "ERROR: " + e);
}
</script>

</body>
</html>
