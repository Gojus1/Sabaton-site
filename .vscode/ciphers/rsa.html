<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sabaton – RSA</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header id="header">
<div class="logo" id="logo">Sabaton</div>
<nav class="top-nav">
<button>Info</button>
<button>Donate</button>
<button>Contact</button>
</nav>
</header>

<div id="layout">

<aside id="ciphers">
<h2>Ciphers</h2>
<ul>
<li><a href="enigma.html">Enigma</a></li>
<li><a href="shamir.html">Shamir</a></li>

<li><a href="rabin.html">Rabin</a></li>
<li><a href="stream.html">Stream</a></li>
</ul>
</aside>

<main id="main">

<h1>RSA Cipher</h1>

<section class="panel">

<label>Alphabet</label>
<input id="alph" value="aąbcčdeęėfghiįyjklmnoprsštuųūvzž ">

<label>Ciphertext</label>
<textarea id="cipher"></textarea>

<label>Fragment</label>
<textarea id="frag"></textarea>

<button class="action" onclick="runRSA()">Run</button>

<div id="output" class="output">(waiting)</div>

</section>

</main>
</div>

<script>

function runRSA(){

const alph = document.getElementById("alph").value;
const cipher = document.getElementById("cipher").value.trim();
const frag = document.getElementById("frag").value.trim();

let output = document.getElementById("output");

const url =
"http://64.23.173.13:8080/rsa"
+ "?alph=" + encodeURIComponent(alph)
+ "&cipher=" + encodeURIComponent(cipher)
+ "&frag=" + encodeURIComponent(frag);

output.textContent="Running...";

fetch(url)
.then(r=>r.text())
.then(t=>output.textContent=t)
.catch(e=>output.textContent=e);

}
  const logo = document.getElementById('logo');
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    window.location.href = '/.vscode/laucher.html';
  });
</script>

</body>
