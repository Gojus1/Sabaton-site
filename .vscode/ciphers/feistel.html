<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feistel Cipher Tester</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 60px; margin-top: 5px; }
input, button { margin-top: 5px; }
pre { background: #eee; padding: 10px; white-space: pre-wrap; }
label { display: block; margin-top: 10px; }
</style>
</head>
<body>
<h2>Feistel Cipher Tester</h2>

<label>Cipher Text:<br>
<textarea id="cipher">[[11, 64], [3, 91], [13, 67], [15, 71], [14, 71]]</textarea></label>

<label>Fragment / Key:<br>
<textarea id="frag">f=3;k=[248,82,45]</textarea></label>

<button onclick="runFeistel()">Run</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
function runFeistel(){
    const cipher = encodeURIComponent(document.getElementById('cipher').value);
    const frag = encodeURIComponent(document.getElementById('frag').value);

    const url = `http://localhost:8080/feistel?cipher=${cipher}&frag=${frag}`;
    fetch(url)
        .then(r => r.text())
        .then(txt => document.getElementById('output').textContent = txt)
        .catch(e => document.getElementById('output').textContent = e);
}
</script>
</body>
</html>
