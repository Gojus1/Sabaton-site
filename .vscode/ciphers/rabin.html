<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WHATSECRET – Rabin</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../favicon.png" type="image/png">
</head>

<body>

<header id="header">
<div class="logo" id="logo">WHATSECRET</div>
<nav class="top-nav">
</nav>
</header>

<div id="layout">

<aside id="ciphers">
<h2>Ciphers</h2>
<ul>
<li><a href="enigma.html">Enigma</a></li>
<li><a href="shamir.html">Shamir</a></li>
<li><a href="rsa.html">RSA</a></li>
<li><a href="rabin.html"><b>Rabin</b></a></li>
<li><a href="stream.html">Stream</a></li>
</ul>
</aside>

<main id="main">

<h1>Rabin Cipher</h1>

<section class="panel">

<label>Alphabet</label>
<input id="alph" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ ">

<label>Cipher</label>
<textarea id="cipher"></textarea>

<label>p</label>
<input id="p">

<label>q</label>
<input id="q">

<button class="action" onclick="runRabin()">Decode</button>

<div id="output" class="output">(waiting)</div>

</section>

</main>
</div>

<script>

function runRabin(){

const alph = document.getElementById("alph").value;
const cipher = document.getElementById("cipher").value.trim();
const p = document.getElementById("p").value.trim();
const q = document.getElementById("q").value.trim();

let output = document.getElementById("output");

const frag = `${cipher}|${p}|${q}`;

const url =
"https://api.whatsecret.org/rabin"
+ "?alph=" + encodeURIComponent(alph)
+ "&cipher=" + encodeURIComponent(cipher)
+ "&frag=" + encodeURIComponent(frag);

output.textContent="Running...";

fetch(url)
.then(r=>r.text())
.then(t=>output.textContent=t)
.catch(e=>output.textContent=e);

}

  const logo = document.getElementById('logo');
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    window.location.href = '/';
  });


</script>

</body>
</html>
