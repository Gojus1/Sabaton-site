<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sabaton – Shamir</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header id="header">
<div class="logo" id="logo">Sabaton</div>
<nav class="top-nav">
<button>Info</button>
<button>Donate</button>
<button>Contact</button>
</nav>
</header>

<div id="layout">

<aside id="ciphers">
<h2>Ciphers</h2>
<ul>
<li><a href="enigma.html">Enigma</a></li>
<li><a href="shamir.html"><b>Shamir</b></a></li>
<li><a href="rsa.html">RSA</a></li>
<li><a href="rabin.html">Rabin</a></li>
<li><a href="stream.html">Stream</a></li>
</ul>
</aside>

<main id="main">

<h1>Shamir Secret Sharing</h1>

<section class="panel">

<label>Alphabet</label>
<input id="alph" value="AĄBCČDEĘĖFGHIĮYJKLMNOPRSŠTUŲŪVZŽ">

<label>X values</label>
<input id="x1">
<input id="x2">
<input id="x3">

<label>S values</label>
<input id="s1">
<input id="s2">
<input id="s3">

<label>Prime (p)</label>
<input id="p">

<button class="action" onclick="run()">Decode</button>

<div id="result" class="output">(waiting)</div>

</section>

</main>
</div>

<script>

function run(){

const alph = document.getElementById("alph").value;

const x = [
document.getElementById("x1").value,
document.getElementById("x2").value,
document.getElementById("x3").value
];

const s = [
document.getElementById("s1").value,
document.getElementById("s2").value,
document.getElementById("s3").value
];

const p = document.getElementById("p").value;

const frag =
x.join(",") + "|" +
s.join(",") + "|" +
p;

const url =
"https://64.23.173.13:8080/shamir"
+ "?alph=" + encodeURIComponent(alph)
+ "&cipher="
+ "&frag=" + encodeURIComponent(frag);

let result = document.getElementById("result");
result.textContent = "Running...";

fetch(url)
.then(r=>r.text())
.then(t=>result.textContent=t);

}
  const logo = document.getElementById('logo');
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    window.location.href = '/.vscode/laucher.html';
  });
</script>

</body>
</html>
